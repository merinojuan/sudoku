<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <base href="/">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Juega al Sudoku, accesible desde cualquiera de tus dispositivos." />
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
	<link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Sudoku</title>
</head>
<body>
  <app-root></app-root>
  <noscript>Habilite JavaScript para continuar utilizando esta aplicación.</noscript>
  <script>
    let installPrompt = null;
    const installContainer = document.querySelector("#install-container");
    const installButton = document.querySelector("#install-button");

    window.addEventListener("appinstalled", () => {
      disableInAppInstallPrompt();
    });

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      installPrompt = event;
      installContainer.removeAttribute("hidden");
    });

    installButton.addEventListener("click", async () => {
      if (!installPrompt) {
        return;
      }
      const result = await installPrompt.prompt();
      disableInAppInstallPrompt();
    });

    function disableInAppInstallPrompt() {
      installPrompt = null;
      installContainer.setAttribute("hidden", "");
    }
  </script>
</body>
</html>
